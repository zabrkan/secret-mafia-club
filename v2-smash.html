<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secret Mafia Club — tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme-smash.css">
</head>
<body class="theme-smash">
<header class="topbar">
  <div class="brand"><span class="logo-bolt">⚔</span><span class="logo-word">SECRET MAFIA <em>CLUB</em></span></div>
  <nav class="mainnav">
    <button data-view="dashboard" class="active">Battle Records</button>
    <button data-view="roster">Character Select</button>
  </nav>
  <div class="topbar-right"><span id="syncStatus" class="sync" style="font-size:11px;letter-spacing:.3px;margin-right:12px;white-space:nowrap"></span><div class="coin">© SEASON 1</div></div>
</header>
<main class="app">
  <section id="view-dashboard" class="view">
    <h1 class="dash-title">Battle Records</h1>
    <div id="statCards" class="stat-cards"></div>
    <div id="factionRecord" class="faction"></div>
    <div class="awards-head"><h3>Hall of fame</h3><span class="panel-tag">auto-awarded · click to open</span></div>
    <div id="superlatives" class="awards"></div>
    <div class="dash-cols">
      <section class="panel panel-lb">
        <div class="panel-head"><h3>Leaderboard</h3><span class="panel-tag" id="sortLabel">by wins</span></div>
        <div class="sortbar" id="sortbar">
          <button data-sort="winRate">Win %</button>
          <button data-sort="wins" class="active">Wins</button>
          <button data-sort="games">Games</button>
          <button data-sort="mafiaWR">Getaway %</button>
          <button data-sort="mafiaFreq">Rap sheet</button>
          <button data-sort="citWR">Town read</button>
          <button data-sort="streak">Streak</button>
        </div>
        <div class="sort-caption" id="sortCaption"></div>
        <div id="leaderboard"></div>
      </section>
      <section class="panel">
        <div class="panel-head"><h3>Recent game nights</h3><span class="panel-tag">latest first</span></div>
        <div id="feed"></div>
      </section>
    </div>
  </section>
  <section id="view-roster" class="view hidden">
    <div class="roster-head">
      <h2 class="roster-title">Choose your player</h2>
      <input id="rosterSearch" placeholder="Search by name…" autocomplete="off">
      <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="cit">Pure Citizens</button>
        <button data-filter="maf">Ran Mafia</button>
        <button data-filter="vet">Veterans</button>
      </div>
      <span id="rosterCount" class="roster-count"></span>
    </div>
    <div id="rosterGrid" class="roster-grid"></div>
  </section>
</main>
<div id="charModal" class="modal hidden">
  <div class="modal-card">
    <button data-close class="modal-x" aria-label="Close">✕</button>
    <div id="charModalBody"></div>
  </div>
</div>
<script src="config.js"></script>
<script src="sheet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
